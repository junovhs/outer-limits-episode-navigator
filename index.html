        <style>
            :root {
                --bg-color: #050505;
                --text-color: #e0e0e0;
                --primary-color: #00ff41; /* Classic terminal green */
                --secondary-color: #0ff; /* Cyan accents */
                --card-bg: #0a0f0a;
                --card-border: #1a3a1a;
                --font-main: "Courier New", Courier, monospace;
            }

            body {
                margin: 0;
                padding: 0;
                background-color: var(--bg-color);
                color: var(--text-color);
                font-family: var(--font-main);
                line-height: 1.6;
                overflow-x: hidden;
            }

            /* CRT Scanline Effect */
            body::before {
                content: " ";
                display: block;
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                right: 0;
                background:
                    linear-gradient(
                        rgba(18, 16, 16, 0) 50%,
                        rgba(0, 0, 0, 0.25) 50%
                    ),
                    linear-gradient(
                        90deg,
                        rgba(255, 0, 0, 0.06),
                        rgba(0, 255, 0, 0.02),
                        rgba(0, 0, 255, 0.06)
                    );
                z-index: 2;
                background-size:
                    100% 4px,
                    3px 100%;
                pointer-events: none;
            }

            header {
                text-align: center;
                padding: 40px 20px;
                border-bottom: 2px solid var(--primary-color);
                box-shadow: 0 0 15px var(--primary-color);
                background: radial-gradient(
                    circle at center,
                    #0a1a0a 0%,
                    #000 100%
                );
            }

            h1 {
                margin: 0;
                font-size: 2.5rem;
                color: var(--primary-color);
                text-transform: uppercase;
                letter-spacing: 4px;
                text-shadow: 0 0 10px var(--primary-color);
                animation: flicker 3s infinite alternate;
            }

            .subtitle {
                color: var(--secondary-color);
                font-size: 1rem;
                margin-top: 10px;
                text-shadow: 0 0 5px var(--secondary-color);
            }

            @keyframes flicker {
                0%,
                19%,
                21%,
                23%,
                25%,
                54%,
                56%,
                100% {
                    opacity: 1;
                    text-shadow: 0 0 10px var(--primary-color);
                }
                20%,
                24%,
                55% {
                    opacity: 0.8;
                    text-shadow: none;
                }
            }

            .layout-container {
                display: flex;
                flex-wrap: wrap;
                padding: 20px;
                gap: 20px;
            }

            /* Sidebar Controls */
            .sidebar {
                flex: 1 1 250px;
                max-width: 300px;
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                padding: 20px;
                height: fit-content;
                position: sticky;
                top: 20px;
                box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
            }

            .sidebar h2 {
                font-size: 1.2rem;
                color: var(--secondary-color);
                border-bottom: 1px solid var(--card-border);
                padding-bottom: 10px;
                margin-top: 20px;
            }

            .sidebar h2:first-child {
                margin-top: 0;
            }

            .control-group {
                margin-bottom: 15px;
            }

            label {
                display: block;
                font-size: 0.9rem;
                margin-bottom: 5px;
                color: #aaa;
            }

            input[type="text"],
            select {
                width: 100%;
                padding: 8px;
                background: #000;
                border: 1px solid var(--primary-color);
                color: var(--primary-color);
                font-family: var(--font-main);
                font-size: 0.9rem;
                box-sizing: border-box;
            }

            input[type="range"] {
                width: 100%;
                accent-color: var(--primary-color);
            }

            .rating-display {
                color: var(--primary-color);
                font-weight: bold;
                font-size: 1.1rem;
            }

            .checkbox-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 5px;
            }

            .checkbox-item {
                display: flex;
                align-items: center;
                font-size: 0.85rem;
                cursor: pointer;
            }

            .checkbox-item input {
                margin-right: 5px;
                accent-color: var(--secondary-color);
            }

            .btn-clear {
                width: 100%;
                padding: 10px;
                background: transparent;
                border: 1px solid #ff3333;
                color: #ff3333;
                font-family: var(--font-main);
                cursor: pointer;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-top: 10px;
                transition: all 0.3s;
            }

            .btn-clear:hover {
                background: #ff3333;
                color: #000;
                box-shadow: 0 0 10px #ff3333;
            }

            /* Main Content */
            .main-content {
                flex: 3 1 600px;
            }

            .results-info {
                margin-bottom: 20px;
                color: var(--secondary-color);
                font-size: 0.9rem;
                border-bottom: 1px dashed var(--card-border);
                padding-bottom: 10px;
            }

            .episode-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 20px;
            }

            .episode-card {
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                padding: 15px;
                transition: all 0.3s ease;
                position: relative;
                overflow: hidden;
            }

            .episode-card::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 4px;
                height: 100%;
                background: var(--primary-color);
                opacity: 0.5;
            }

            .episode-card:hover {
                border-color: var(--primary-color);
                box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
                transform: translateY(-3px);
            }

            .ep-id {
                font-size: 0.8rem;
                color: var(--secondary-color);
                margin-bottom: 5px;
            }

            .ep-title {
                font-size: 1.1rem;
                color: var(--text-color);
                margin: 0 0 10px 0;
                text-transform: uppercase;
            }

            .ep-rating {
                position: absolute;
                top: 15px;
                right: 15px;
                background: #000;
                border: 1px solid var(--primary-color);
                padding: 3px 8px;
                color: var(--primary-color);
                font-weight: bold;
                font-size: 0.9rem;
            }

            .ep-summary {
                font-size: 0.85rem;
                color: #b0b0b0;
                margin-bottom: 10px;
            }

            .ep-themes {
                display: flex;
                flex-wrap: wrap;
                gap: 5px;
                margin-top: 10px;
            }

            .theme-tag {
                font-size: 0.7rem;
                background: #111;
                color: var(--secondary-color);
                border: 1px solid #333;
                padding: 2px 6px;
                border-radius: 3px;
            }

            .no-results {
                grid-column: 1 / -1;
                text-align: center;
                padding: 40px;
                color: #ff3333;
                border: 1px dashed #ff3333;
            }

            /* Responsive */
            @media (max-width: 768px) {
                .sidebar {
                    position: static;
                    max-width: 100%;
                }
                h1 {
                    font-size: 1.5rem;
                }
            }
        </style>

                                imdb_rating: 6.2,
                            },
                            {

                                title: "The Tipping Point",
                                summary:
                                    "A hacker fights a universal programming language that may birth a dangerous AI.",

                            },
                            {

                                title: "Dark Child",
                                summary:
                                    "An abduction survivor's memories resurface as her daughter's new teacher seems eerily familiar.",
                                imdb_rating: 6.0,
                            },
                            {
                                id: "S07E21",
                                season: 7,
                                episode: 21,
                                title: "The Human Factor",
                                summary:
                                    "In 2084, a commander plays chess with an android to prove humanity deserves to survive.",
                                imdb_rating: 6.4,
                            },
                            {
                                id: "S07E22",
                                season: 7,
                                episode: 22,
                                title: "Human Trials",
                                summary:
                                    "Four recruits compete for a solo mission through increasingly real simulation tests.",
                                imdb_rating: 5.3,
                            },
                        ],
                    },
                ],
            };

            // --- THEME EXTRACTION LOGIC ---
            // We determine themes based on keywords in the summary so the user can filter by them.
            const themeKeywords = {
                "Aliens & Space": [
                    "alien",
                    "martian",
                    "space",
                    "ship",
                    "shuttle",
                    "mars",
                    "venus",
                    "wormhole",
                    "abduct",
                    "galaxy",
                    "ufo",
                ],
                "AI & Robotics": [
                    "android",
                    "robot",
                    "ai",
                    "machine",
                    "implant",
                    "inhibitor",
                    "nanobot",
                    "holographic",
                    "computer",
                    "innobotics",
                ],
                "Time Travel": [
                    "time",
                    "time-travel",
                    "traveler",
                    "past",
                    "future",
                    "decade",
                    "1969",
                    "loops",
                ],
                "Genetics & Mutations": [
                    "gene",
                    "clone",
                    "dna",
                    "mutant",
                    "mutation",
                    "virus",
                    "plague",
                    "sterile",
                    "genetic",
                    "resurrect",
                    "regenerat",
                ],
                "Mind & Memory": [
                    "mind",
                    "memory",
                    "brain",
                    "psychic",
                    "telepathy",
                    "hallucination",
                    "haunt",
                    "sanity",
                    "consciousness",
                    "dream",
                ],
                "Death & Murder": [
                    "kill",
                    "murder",
                    "dead",
                    "death",
                    "assassin",
                    "execution",
                    "doomsday",
                    "hostage",
                ],
                "Virtual Reality": [
                    "virtual",
                    "vr",
                    "simulation",
                    "cyber",
                    "matrix",
                    "hologram",
                ],
            };

            function extractThemes(summary) {
                const lowerSummary = summary.toLowerCase();
                let themes = [];
                for (const [theme, keywords] of Object.entries(themeKeywords)) {
                    if (
                        keywords.some((keyword) =>
                            lowerSummary.includes(keyword),
                        )
                    ) {
                        themes.push(theme);
                    }
                }
                return themes.length > 0 ? themes : ["Miscellaneous"];
            }

            // --- FLATTEN DATA ---
            let allEpisodes = [];
            showData.seasons.forEach((season) => {
                season.episodes.forEach((ep) => {
                    ep.themes = extractThemes(ep.summary);
                    ep.year = season.years;
                    allEpisodes.push(ep);
                });
            });

            // --- STATE & ELEMENTS ---
            const state = {
                search: "",
                minRating: 0,
                seasons: new Set(),
                themes: new Set(),
            };

            const elements = {
                grid: document.getElementById("episodeGrid"),
                resultsInfo: document.getElementById("resultsInfo"),
                searchInput: document.getElementById("searchInput"),
                ratingSlider: document.getElementById("ratingSlider"),
                ratingValue: document.getElementById("ratingValue"),
                seasonFilters: document.getElementById("seasonFilters"),
                themeFilters: document.getElementById("themeFilters"),
            };

            // --- POPULATE FILTERS ---
            function buildFilters() {
                // Seasons
                showData.seasons.forEach((s) => {
                    const wrapper = document.createElement("div");
                    wrapper.className = "checkbox-item";
                    wrapper.innerHTML = `
                    <input type="checkbox" id="season-${s.season}" value="${s.season}" onchange="toggleSeason(${s.season})">
                    <label for="season-${s.season}">Season ${s.season}</label>
                `;
                    elements.seasonFilters.appendChild(wrapper);
                });

                // Themes
                const allThemes = [
                    ...new Set(allEpisodes.flatMap((ep) => ep.themes)),
                ].sort();
                allThemes.forEach((theme) => {
                    const wrapper = document.createElement("div");
                    wrapper.className = "checkbox-item";
                    wrapper.innerHTML = `
                    <input type="checkbox" id="theme-${theme}" value="${theme}" onchange="toggleTheme('${theme}')">
                    <label for="theme-${theme}">${theme}</label>
                `;
                    elements.themeFilters.appendChild(wrapper);
                });
            }

            // --- EVENT HANDLERS ---
            elements.searchInput.addEventListener("input", (e) => {
                state.search = e.target.value.toLowerCase();
                renderEpisodes();
            });

            elements.ratingSlider.addEventListener("input", (e) => {
                state.minRating = parseFloat(e.target.value);
                elements.ratingValue.textContent = state.minRating.toFixed(1);
                renderEpisodes();
            });

            function toggleSeason(seasonNum) {
                if (state.seasons.has(seasonNum)) {
                    state.seasons.delete(seasonNum);
                } else {
                    state.seasons.add(seasonNum);
                }
                renderEpisodes();
            }

            function toggleTheme(theme) {
                if (state.themes.has(theme)) {
                    state.themes.delete(theme);
                } else {
                    state.themes.add(theme);
                }
                renderEpisodes();
            }

            function resetFilters() {
                state.search = "";
                state.minRating = 0;
                state.seasons.clear();
                state.themes.clear();

                elements.searchInput.value = "";
                elements.ratingSlider.value = 0;
                elements.ratingValue.textContent = "0.0";
                document
                    .querySelectorAll('input[type="checkbox"]')
                    .forEach((cb) => (cb.checked = false));

                renderEpisodes();
            }

            // --- RENDER LOGIC ---
            function renderEpisodes() {
                const filtered = allEpisodes
                    .filter((ep) => {
                        // Rating filter
                        if (ep.imdb_rating < state.minRating) return false;

                        // Season filter
                        if (
                            state.seasons.size > 0 &&
                            !state.seasons.has(ep.season)
                        )
                            return false;

                        // Theme filter
                        if (state.themes.size > 0) {
                            const hasTheme = ep.themes.some((t) =>
                                state.themes.has(t),
                            );
                            if (!hasTheme) return false;
                        }

                        // Search filter
                        if (state.search) {
                            const inTitle = ep.title
                                .toLowerCase()
                                .includes(state.search);
                            const inSummary = ep.summary
                                .toLowerCase()
                                .includes(state.search);
                            if (!inTitle && !inSummary) return false;
                        }

                        return true;
                    })
                    .sort((a, b) => b.imdb_rating - a.imdb_rating); // Sort by highest rating

                // Update info text
                elements.resultsInfo.textContent = `Displaying ${filtered.length} of ${allEpisodes.length} episodes.`;

                // Build HTML
                if (filtered.length === 0) {
                    elements.grid.innerHTML = `<div class="no-results">[ SIGNAL LOST // NO EPISODES MATCH CURRENT PARAMETERS ]</div>`;
                    return;
                }

                elements.grid.innerHTML = filtered
                    .map(
                        (ep) => `
                <div class="episode-card">
                    <div class="ep-rating">★ ${ep.imdb_rating.toFixed(1)}</div>
                    <div class="ep-id">${ep.id} // ${ep.year}</div>
                    <h3 class="ep-title">${ep.title}</h3>
                    <div class="ep-summary">${ep.summary}</div>
                    <div class="ep-themes">
                        ${ep.themes.map((t) => `<span class="theme-tag">${t}</span>`).join("")}
                    </div>
                </div>
            `,
                    )
                    .join("");
            }

            // --- INIT ---
            buildFilters();
            renderEpisodes();
        </script>
